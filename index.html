<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>일정 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/viewer.css">
</head>
<body>

<!-- 1. 일정 리스트 -->
<div id="list-screen">
  <div class="list-wrap">
    <div class="branch-chip hidden" id="branch-chip"></div>
    <h1>일정</h1>
    <p class="sub">보고 싶은 일정을 선택하세요</p>
    <div id="trip-list"><div class="empty">불러오는 중…</div></div>
  </div>
</div>

<!-- 2. 초대 코드 -->
<div id="code-screen" class="gate hidden">
  <div class="gate-card card">
    <h1 id="code-title"></h1>
    <p class="sub">초대 코드를 입력하면 일정을 볼 수 있어요</p>
    <label for="code-input">초대 코드</label>
    <input id="code-input" type="password" autocomplete="off" placeholder="코드 입력">
    <button class="btn" id="code-btn">확인</button>
    <button class="btn ghost back" id="code-back">뒤로</button>
    <div class="err" id="code-err"></div>
  </div>
</div>

<!-- 3. 뷰어 -->
<div id="viewer-screen" class="hidden">
  <div id="map"></div>
  <div id="panel">
    <header>
      <div class="top">
        <div>
          <h1 id="trip-title"></h1>
          <div class="date" id="trip-date"></div>
        </div>
        <button class="btn ghost sm" id="viewer-back">목록</button>
      </div>
    </header>
    <div id="locate-bar">
      <button class="btn weak" id="locate-btn">📍 내 위치 표시</button>
    </div>
    <div id="stops"></div>
  </div>
</div>

<script type="module" src="js/viewer.js"></script>
</body>
</html>
