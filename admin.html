<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | Schedule in Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- 1. 관리자 비밀번호 게이트 -->
<div id="gate-screen" class="gate">
  <div class="gate-card">
    <div class="eyebrow">Admin</div>
    <h1 id="gate-title">관리자 로그인</h1>
    <p class="sub" id="gate-sub"></p>
    <label for="pass-input">비밀번호</label>
    <input id="pass-input" type="password" autocomplete="off">
    <button class="btn" id="gate-btn">들어가기</button>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<!-- 2. 일정 목록 -->
<div id="dash-screen" class="hidden">
  <div class="dash-wrap">
    <div class="head">
      <div>
        <div class="eyebrow">Admin</div>
        <h1>내 일정</h1>
      </div>
      <button class="btn" id="new-btn">+ 새 일정</button>
    </div>
    <div id="admin-trip-list"><div class="empty">불러오는 중…</div></div>
  </div>
</div>

<!-- 3. 일정 편집 -->
<div id="edit-screen" class="hidden">
  <div id="edit-panel">
    <div class="head">
      <h2 id="edit-title">새 일정</h2>
      <button class="btn ghost sm" id="edit-back">← 목록</button>
    </div>

    <label for="f-title">제목</label>
    <input id="f-title" placeholder="예: 서울 당일치기">

    <label for="f-date">날짜</label>
    <input id="f-date" placeholder="예: 2026. 7. 18 (토)">

    <label for="f-code">초대 코드</label>
    <input id="f-code" placeholder="친구에게 알려줄 코드">

    <div class="hint">
      지도를 클릭하면 그 위치로 정거장이 추가됩니다.<br>
      정거장 카드의 <b>📍 다시 찍기</b>를 누른 뒤 지도를 클릭하면 좌표가 수정됩니다.
    </div>

    <div id="stop-list"></div>
    <button class="btn ghost" id="add-stop-btn" style="width:100%">+ 정거장 직접 추가 (좌표는 지도 클릭)</button>

    <div class="save-bar">
      <button class="btn" id="save-btn">저장</button>
    </div>
    <div id="save-msg"></div>
  </div>
  <div id="edit-map"></div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
